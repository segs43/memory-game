<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0612" />
  <title>🧠 Memory Thief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      --c-bg: #07040f;
      --c-purple-deep: #0f0b1a;
      --c-purple-mid: #2a1540;
      --c-purple-bright: #8b5fcf;
      --c-purple-glow: #b77aff;
      --c-purple-light: #d4b5ff;
      --c-white: #f5edff;
      --c-red-corrupt: #ff2255;
      --c-cyan-glitch: #00ffee;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --font-display: 'Orbitron', monospace;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--c-bg);
      font-family: var(--font-mono);
      color: var(--c-white);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Game canvas fills entire viewport */
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* UI layer sits above canvas */
    #ui-root {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #ui-root > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-root"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
